# Layer configuration for meta-wolfssl-overrides
#
# This layer provides bbappends and overrides for meta-wolfssl recipes,
# customizing wolfSSL for the RPi5 FIPS build.

# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-wolfssl-overrides"
BBFILE_PATTERN_meta-wolfssl-overrides = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-wolfssl-overrides = "7"

LAYERDEPENDS_meta-wolfssl-overrides = "core wolfssl"
LAYERSERIES_COMPAT_meta-wolfssl-overrides = "scarthgap"
